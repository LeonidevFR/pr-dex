<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PR-DEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&family=IBM+Plex+Serif:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
<style>
  :root{
    --paper:#e7ddc7;
    --paper-lo:#ddd0b3;
    --plate:#f2ecda;
    --plate-hi:#fbf6e8;
    --ink:#2c2620;
    --ink-2:#6f6350;
    --ink-3:#9a8a6d;
    --rule:#c3b48f;
    --rule-hi:#b3a179;
    --stamp:#9e3b2e;
    --ochre:#b8862b;
    --herb:#5c7a52;

    --t-c:#8a8175;   /* commun     — pierre  */
    --t-u:#5c7a52;   /* peu commun — herbe   */
    --t-r:#9e3b2e;   /* rare       — tampon  */
    --t-l:#b8862b;   /* légendaire — ocre    */

    --f-display:"IBM Plex Serif", Georgia, serif;
    --f-label:"IBM Plex Sans Condensed", "Helvetica Neue", sans-serif;
    --f-data:"IBM Plex Mono", ui-monospace, monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    color:var(--ink);font-family:var(--f-label);-webkit-font-smoothing:antialiased;
    background-color:var(--paper);
    background-image:
      repeating-linear-gradient(0deg, rgba(120,96,64,.032) 0 1px, transparent 1px 4px),
      radial-gradient(ellipse 85% 55% at 50% -4%, rgba(255,251,240,.75), transparent 66%);
    min-height:100vh;
  }
  img{image-rendering:pixelated}
  a{color:var(--stamp);text-decoration:none}
  a:hover{color:var(--ink)}
  button{font-family:inherit}
  #app{max-width:1180px;margin:0 auto;padding:0 20px 90px}

  .eyebrow{font-family:var(--f-label);font-weight:600;font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-2)}
  .mono{font-family:var(--f-data);font-variant-numeric:tabular-nums}

  /* ───────── rail ───────── */
  .rail{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(180deg, var(--paper) 55%, rgba(231,221,199,.85));
    backdrop-filter:blur(6px);
    border-bottom:1.5px solid var(--rule-hi);
    padding:20px 0 15px;margin-bottom:26px;
    display:flex;align-items:flex-end;gap:26px;flex-wrap:wrap;
  }
  .wordmark{font-family:var(--f-display);font-weight:700;font-size:23px;letter-spacing:-.02em;line-height:1}
  .wordmark span{color:var(--stamp)}
  .rail-sub{margin-top:6px}
  .progress{flex:1;min-width:220px}
  .progress-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
  .progress-count{font-family:var(--f-data);font-size:13px;font-variant-numeric:tabular-nums}
  .progress-count b{font-weight:600}
  .progress-count i{font-style:normal;color:var(--ink-3)}
  .bar{height:3px;background:var(--rule);position:relative;overflow:hidden}
  .bar-fill{position:absolute;inset:0 auto 0 0;background:var(--herb);transition:width .8s cubic-bezier(.2,.8,.2,1)}
  .rail-tools{display:flex;align-items:center;gap:10px}
  .gear{border:1px solid var(--rule-hi);background:transparent;color:var(--ink-2);width:38px;height:38px;cursor:pointer;font-size:15px;transition:background .16s,color .16s}
  .gear:hover{background:var(--plate);color:var(--ink)}

  .claim-btn{
    position:relative;border:1.5px solid var(--stamp);background:transparent;color:var(--stamp);
    font-family:var(--f-label);font-weight:600;font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    padding:11px 18px;cursor:pointer;transition:background .18s,color .18s;
  }
  .claim-btn:hover:not(:disabled){background:var(--stamp);color:var(--plate)}
  .claim-btn:disabled{border-color:var(--rule-hi);color:var(--ink-3);cursor:default}
  .claim-btn .pip{display:inline-block;min-width:18px;padding:0 5px;margin-left:9px;background:var(--stamp);color:var(--plate);font-family:var(--f-data);font-size:11px;font-weight:600;border-radius:9px}
  .claim-btn:hover:not(:disabled) .pip{background:var(--plate);color:var(--stamp)}
  .claim-btn.pulsing{animation:pulse 2.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(158,59,46,0)}50%{box-shadow:0 0 0 4px rgba(158,59,46,.12)}}

  /* ───────── tiroir ───────── */
  .tray{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:1px;
    background:var(--rule-hi);border:1px solid var(--rule-hi);
    box-shadow:0 2px 0 rgba(120,96,64,.16);
  }
  .cell{
    position:relative;aspect-ratio:1;background:var(--plate);border:0;padding:0;cursor:default;
    display:flex;align-items:center;justify-content:center;transition:background .16s;
  }
  .cell.has{cursor:pointer}
  .cell.has:hover,.cell.has:focus-visible{background:var(--plate-hi);outline:none}
  .cell.has:focus-visible{box-shadow:inset 0 0 0 1.5px var(--herb)}
  .cell img{width:76%;height:76%;object-fit:contain;transition:transform .18s}
  .cell.has:hover img{transform:scale(1.09) translateY(-2px)}
  .cell-no{position:absolute;left:6px;top:5px;font-family:var(--f-data);font-size:9px;color:var(--ink-3);letter-spacing:.02em;transition:opacity .16s}
  .cell.has .cell-no{opacity:.9}
  .cell.has:hover .cell-no{opacity:0}
  .cell-sha{position:absolute;left:6px;top:5px;font-family:var(--f-data);font-size:9px;color:var(--stamp);opacity:0;transition:opacity .16s}
  .cell.has:hover .cell-sha{opacity:1}
  .cell-dupes{position:absolute;right:6px;top:5px;font-family:var(--f-data);font-size:9px;color:var(--ink-3)}
  .cell .tier{position:absolute;right:6px;bottom:6px;width:7px;height:7px;border-radius:50%;background:var(--tier);box-shadow:0 0 0 1.5px var(--plate),0 0 0 2.5px rgba(120,96,64,.28)}
  /* silhouette : dessin préparatoire au trait */
  .cell.ghost::after{content:"";position:absolute;inset:11px;border:1px dashed rgba(140,110,72,.34)}
  .cell.ghost img{filter:sepia(1) saturate(.5) brightness(.55);opacity:.16}
  .cell.ghost .cell-no{opacity:.5}
  .cell.shiny::before{content:"✦";position:absolute;right:6px;top:5px;font-size:10px;color:var(--ochre);z-index:2}

  /* ───────── fiche ───────── */
  .scrim{position:fixed;inset:0;z-index:40;background:rgba(44,38,32,.5);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;padding:20px}
  .panel{
    width:min(560px,100%);max-height:88vh;overflow:auto;background:var(--paper);
    border:1.5px solid var(--rule-hi);box-shadow:0 24px 60px rgba(44,38,32,.35);
  }
  .panel-top{display:flex;gap:22px;padding:26px;border-bottom:1.5px solid var(--rule);align-items:center;position:relative}
  .panel-art{
    width:132px;height:132px;flex-shrink:0;display:grid;place-items:center;position:relative;
    background:var(--plate);
    box-shadow:inset 0 0 0 1px var(--rule),0 0 0 5px var(--paper),0 0 0 6px var(--rule);
  }
  .panel-art::before{content:"";position:absolute;inset:8px;border:1px dashed rgba(140,110,72,.3)}
  .panel-art img{width:80%;height:80%;object-fit:contain;position:relative}
  .panel-art.ghost img{filter:sepia(1) saturate(.5) brightness(.55);opacity:.2}
  .panel-plate{font-family:var(--f-data);font-size:10px;color:var(--ink-3);letter-spacing:.08em}
  .panel-name{font-family:var(--f-display);font-size:28px;font-weight:600;letter-spacing:-.015em;line-height:1.08;margin:5px 0 11px}
  .chip{display:inline-block;font-family:var(--f-label);font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;padding:4px 9px;border:1px solid var(--tier);color:var(--tier);background:rgba(255,255,255,.25)}
  .chip.shiny-chip{border-color:var(--ochre);color:var(--ochre)}
  .x{position:absolute;right:16px;top:14px;background:none;border:0;color:var(--ink-3);font-family:var(--f-data);font-size:16px;cursor:pointer;padding:6px;line-height:1}
  .x:hover{color:var(--ink)}

  .sect{padding:20px 26px;border-bottom:1.5px solid var(--rule)}
  .sect:last-child{border-bottom:0}
  .sect-h{margin-bottom:14px;display:flex;justify-content:space-between;align-items:baseline}

  .log{display:flex;flex-direction:column}
  .log-row{display:flex;gap:13px;align-items:baseline;padding:10px 0;border-bottom:1px solid rgba(179,161,121,.4)}
  .log-row:last-child{border-bottom:0}
  a.log-row:hover .log-title{color:var(--stamp)}
  .log-sha{font-family:var(--f-data);font-size:11px;color:var(--stamp);flex-shrink:0}
  .log-title{font-size:13.5px;line-height:1.4;flex:1;transition:color .15s}
  .log-repo{font-family:var(--f-data);font-size:11px;color:var(--ink-3)}
  .log-date{font-family:var(--f-data);font-size:10px;color:var(--ink-3);flex-shrink:0}
  .log-evo{font-family:var(--f-data);font-size:11px;color:var(--ochre);flex-shrink:0}

  .candy{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .candy-meter{flex:1;min-width:150px}
  .candy-nums{font-family:var(--f-data);font-size:12px;margin-bottom:6px}
  .candy-nums b{font-weight:600;color:var(--ochre)}
  .candy-nums i{font-style:normal;color:var(--ink-3)}
  .cbar{height:3px;background:var(--rule);position:relative;overflow:hidden}
  .cbar-fill{position:absolute;inset:0 auto 0 0;background:var(--ochre);transition:width .5s}
  .evo-btn{border:1.5px solid var(--ochre);background:transparent;color:var(--ochre);font-family:var(--f-label);font-weight:600;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:10px 16px;cursor:pointer;transition:background .18s,color .18s}
  .evo-btn:hover:not(:disabled){background:var(--ochre);color:var(--paper)}
  .evo-btn:disabled{border-color:var(--rule-hi);color:var(--ink-3);cursor:default}
  .evo-choices{display:flex;gap:9px;margin-top:13px;flex-wrap:wrap}
  .evo-choice{background:var(--plate);border:1px solid var(--rule);padding:9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;width:80px;font-family:var(--f-label);font-size:10px;color:var(--ink-2);transition:border-color .15s,color .15s}
  .evo-choice:hover:not(:disabled){border-color:var(--ochre);color:var(--ink)}
  .evo-choice:disabled{opacity:.45;cursor:default}
  .evo-choice img{width:46px;height:46px}
  .muted{color:var(--ink-2);font-size:12.5px;line-height:1.55}
  .muted b{color:var(--ink)}

  /* réserve : doublons sans évolution (question ouverte 1) */
  .reserve{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .reserve-count{font-family:var(--f-display);font-size:34px;font-weight:600;color:var(--ink);line-height:1}
  .reserve-txt{flex:1;min-width:180px}
  .press{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
  .press span{width:16px;height:20px;background:var(--plate);border:1px solid var(--rule-hi);display:grid;place-items:center;font-family:var(--f-data);font-size:8px;color:var(--ink-3)}

  /* ───────── rituel ───────── */
  .ritual{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;overflow:hidden;
    background:var(--paper);
    background-image:repeating-linear-gradient(0deg, rgba(120,96,64,.032) 0 1px, transparent 1px 4px);}
  .ritual.opened{background:radial-gradient(ellipse 70% 60% at 50% 45%, #241d15 0%, #14100b 78%)}
  .ritual.opened.leg{background:radial-gradient(ellipse 75% 65% at 50% 45%, #3a2b12 0%, #120d07 80%)}

  .stack{position:relative;width:250px;height:346px}
  .stack .ghost-pkt{position:absolute;inset:0;background:var(--plate);border:1px solid var(--rule-hi);box-shadow:0 10px 24px rgba(44,38,32,.2)}
  .stack .ghost-pkt.g1{transform:translate(9px,10px) rotate(1.6deg)}
  .stack .ghost-pkt.g2{transform:translate(-8px,6px) rotate(-1.4deg)}
  .packet{
    position:absolute;inset:0;cursor:pointer;border:0;padding:0;
    background:var(--plate);
    box-shadow:0 22px 50px rgba(44,38,32,.34);
    display:flex;flex-direction:column;
    transition:transform .2s cubic-bezier(.2,.8,.2,1);
  }
  .packet:hover{transform:translateY(-5px)}
  .packet::after{content:"";position:absolute;inset:9px;border:1px solid var(--rule);pointer-events:none}
  .pkt-head{padding:20px 22px 0;text-align:left}
  .pkt-kicker{font-family:var(--f-label);font-weight:600;font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-3)}
  .pkt-body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 24px;text-align:center}
  .pkt-seal{width:64px;height:64px;margin:0 auto 20px;border-radius:50%;background:radial-gradient(circle at 40% 35%, #b8493a, var(--stamp) 70%);box-shadow:0 3px 8px rgba(44,38,32,.4),inset 0 2px 4px rgba(255,255,255,.25),inset 0 -3px 6px rgba(0,0,0,.25);display:grid;place-items:center;color:rgba(255,240,230,.9);font-family:var(--f-data);font-size:19px}
  .pkt-title{font-family:var(--f-display);font-size:18px;font-weight:600;color:var(--ink);line-height:1.32;margin-bottom:10px}
  .pkt-pr{font-family:var(--f-data);font-size:11px;color:var(--ink-3);line-height:1.7}
  .pkt-foot{padding:0 22px 18px;text-align:center;font-family:var(--f-label);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-3)}
  .packet.tearing{animation:tear .42s cubic-bezier(.5,0,.75,0) forwards}
  @keyframes tear{0%{transform:none}40%{transform:scale(1.05) rotate(-1deg)}100%{transform:scale(1.35) rotate(2deg) translateY(-10px);opacity:0;filter:blur(7px)}}
  .queue-note{font-family:var(--f-data);font-size:11px;color:var(--ink-3);letter-spacing:.04em}

  .reveal{position:relative;display:grid;place-items:center;width:360px;height:360px}
  .rays{position:absolute;width:920px;height:920px;pointer-events:none;
    background:conic-gradient(from 0deg, var(--tier) 0deg 2.5deg, transparent 2.5deg 20deg);
    opacity:0;mask-image:radial-gradient(circle,#000 0%,transparent 60%);-webkit-mask-image:radial-gradient(circle,#000 0%,transparent 60%);
    animation:raysSpin 6s linear infinite, raysIn .8s ease-out forwards}
  @keyframes raysSpin{to{transform:rotate(360deg)}}
  @keyframes raysIn{to{opacity:var(--rayop)}}
  .flash{position:absolute;width:200px;height:200px;border-radius:50%;background:#fff5e6;animation:flash .55s ease-out forwards}
  @keyframes flash{0%{transform:scale(.15);opacity:.95}100%{transform:scale(var(--flashscale));opacity:0}}
  .reveal img{width:220px;height:220px;object-fit:contain;position:relative;
    filter:drop-shadow(0 0 var(--glow) var(--tier));
    transition:filter .45s ease-out;
    animation:silhAppear .55s cubic-bezier(.18,1.4,.4,1) both}
  .reveal img.silh{filter:brightness(0) invert(.5) contrast(.85)}
  .reveal.revealed img{animation:pop .5s ease-out}
  @keyframes silhAppear{0%{transform:scale(.4) translateY(-22px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
  @keyframes pop{0%{transform:scale(1)}42%{transform:scale(1.12)}100%{transform:scale(1)}}
  .dev-ring{position:absolute;width:150px;height:150px;border-radius:50%;border:1px solid var(--tier);opacity:0;animation:devRing 1.6s ease-out infinite}
  @keyframes devRing{0%{transform:scale(.55);opacity:.45}100%{transform:scale(2.3);opacity:0}}
  .dev-note{font-family:var(--f-data);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:#a99a7f;animation:devNote 1.7s ease-in-out infinite}
  @keyframes devNote{0%,100%{opacity:.38}50%{opacity:.85}}
  .reveal-meta{text-align:center;animation:fadeUp .5s ease-out .48s both;color:#f0e7d4}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .reveal-banner{font-family:var(--f-label);font-weight:700;font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:var(--ochre);margin-bottom:10px;animation:fadeUp .4s ease-out .3s both}
  .reveal-name{font-family:var(--f-display);font-size:40px;font-weight:700;letter-spacing:-.025em;line-height:1;color:#f6efdf}
  .reveal-tags{display:flex;gap:8px;justify-content:center;margin-top:13px}
  .reveal .chip{background:rgba(255,255,255,.06)}
  .reveal-note{font-family:var(--f-data);font-size:11px;margin-top:17px;color:#a99a7f}
  .reveal-note b{color:var(--ochre);font-weight:500}
  .next-btn{border:1.5px solid rgba(240,231,212,.35);background:transparent;color:#f0e7d4;font-family:var(--f-label);font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:11px 24px;cursor:pointer;animation:fadeUp .5s ease-out .75s both}
  .next-btn:hover{border-color:#f0e7d4}
  .shiny-burst{position:absolute;inset:0;pointer-events:none}
  .spark{position:absolute;width:4px;height:4px;background:#ffe9a8;border-radius:50%;box-shadow:0 0 6px #ffd766;animation:spark 1.6s ease-out infinite}
  @keyframes spark{0%{transform:scale(0);opacity:0}30%{transform:scale(2.6);opacity:1}100%{transform:scale(0);opacity:0}}

  /* ───────── évolution ───────── */
  .evostage{position:fixed;inset:0;z-index:70;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;background:radial-gradient(ellipse 70% 60% at 50% 45%, #241d15, #14100b 80%)}
  .evo-frame{position:relative;display:grid;place-items:center;width:300px;height:300px}
  .evo-frame img{position:absolute;width:210px;height:210px;object-fit:contain}
  .evo-from{animation:evoOut 1.5s ease-in forwards}
  .evo-to{opacity:0;filter:drop-shadow(0 0 34px var(--tier));animation:evoIn 1.1s ease-out 1.35s forwards}
  @keyframes evoOut{0%{opacity:1;filter:none}45%{filter:brightness(4) saturate(0)}100%{opacity:0;filter:brightness(9) saturate(0);transform:scale(1.04)}}
  @keyframes evoIn{0%{opacity:0;filter:brightness(6) saturate(0) drop-shadow(0 0 34px var(--tier))}100%{opacity:1;filter:drop-shadow(0 0 26px var(--tier))}}
  .evo-glow{position:absolute;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,#fff6e2,transparent 62%);opacity:0;animation:evoGlow 2.6s ease-in-out forwards}
  @keyframes evoGlow{0%,30%{opacity:0}55%{opacity:.9}100%{opacity:0}}
  .evo-cap{text-align:center;color:#f0e7d4;animation:fadeUp .6s ease-out 2.4s both}
  .evo-cap .reveal-name{color:#f6efdf}

  /* ───────── connexion / réglages ───────── */
  .front{max-width:600px;margin:0 auto;padding:70px 20px 100px}
  .front-mark{font-family:var(--f-display);font-weight:700;font-size:30px;letter-spacing:-.02em}
  .front-mark span{color:var(--stamp)}
  .front-sub{margin-top:8px;font-size:14px;color:var(--ink-2);line-height:1.6;max-width:52ch}
  .sheet{background:var(--paper);border:1.5px solid var(--rule-hi);margin-top:34px;box-shadow:0 3px 0 rgba(120,96,64,.14)}
  .sheet-h{padding:16px 24px;border-bottom:1.5px solid var(--rule);display:flex;align-items:center;justify-content:space-between}
  .sheet-h .eyebrow{color:var(--ink-2)}
  .sheet-b{padding:22px 24px}
  .steps{list-style:none;counter-reset:s;display:flex;flex-direction:column;gap:16px;margin-bottom:22px}
  .steps li{counter-increment:s;position:relative;padding-left:38px;font-size:13.5px;line-height:1.55;color:var(--ink)}
  .steps li::before{content:counter(s);position:absolute;left:0;top:-1px;width:24px;height:24px;border:1.5px solid var(--rule-hi);border-radius:50%;display:grid;place-items:center;font-family:var(--f-data);font-size:11px;color:var(--ink-2)}
  .steps code{font-family:var(--f-data);font-size:12px;background:var(--plate);border:1px solid var(--rule);padding:1px 6px;color:var(--stamp)}
  .perm{display:flex;flex-direction:column;gap:8px;background:var(--plate);border:1px solid var(--rule);padding:14px 16px;margin-bottom:22px}
  .perm-row{display:flex;gap:10px;font-family:var(--f-data);font-size:12px;color:var(--ink);align-items:baseline}
  .perm-row .k{color:var(--ink-3);min-width:130px}
  .perm-row b{color:var(--herb)}
  .field{display:flex;flex-direction:column;gap:8px;margin-bottom:6px}
  .field label{font-family:var(--f-label);font-weight:600;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-2)}
  .field input{font-family:var(--f-data);font-size:13px;padding:12px 14px;background:var(--plate);border:1.5px solid var(--rule-hi);color:var(--ink)}
  .field input:focus{outline:none;border-color:var(--herb)}
  .front-actions{display:flex;gap:12px;align-items:center;margin-top:18px;flex-wrap:wrap}

<body>
<div id="app"></div>
<script>
const { createApp, ref, computed, reactive } = Vue;

/* ============================================================
   1. ESPÈCES — [id, nom, tier, évolueVers, coût bonbons]
   tier: c=commun u=peu commun r=rare l=légendaire
   Les 151 sont draftables ; les bonbons sont un raccourci vers
   une évolution, pas le seul chemin.
   ============================================================ */
const SPECIES = [

[4,"Salamèche","r",5,8],[5,"Reptincel","u",6,16],[6,"Dracaufeu","r"],

[150,"Mewtwo","l"],[151,"Mew","l"],
];

const DEX = {};
SPECIES.forEach(([id,name,tier,to,cost]) => { DEX[id] = {id,name,tier,to:to??null,cost:cost??null}; });
const PARENT = {};
Object.values(DEX).forEach(s => { if(!s.to) return; (Array.isArray(s.to)?s.to:[s.to]).forEach(t=>PARENT[t]=s.id); });
const familyOf = id => { let c=id; while(PARENT[c]) c=PARENT[c]; return c; };
const hasEvoInFamily = id => { const f=familyOf(id); return !!DEX[f].to || SPECIES.some(s=>familyOf(s[0])===f && DEX[s[0]].to); };

const POOL = { c:[], u:[], r:[], l:[] };
Object.values(DEX).forEach(s => POOL[s.tier].push(s.id));
const WEIGHTS = [["c",0.45],["u",0.42],["r",0.125],["l",0.005]];
const TIER_LABEL = { c:"Commun", u:"Peu commun", r:"Rare", l:"Légendaire" };
const TIER_VAR   = { c:"var(--t-c)", u:"var(--t-u)", r:"var(--t-r)", l:"var(--t-l)" };
const CANDY_PER_CATCH = 3, SHINY_ODDS = 128;

/* échelle d'intensité du rituel — 4 crans, durée quasi constante (répétable ~300×/an) */
const INTENSITY = {
  c:{ rayop:0,   glow:"8px",  flashscale:2.4, banner:"Spécimen commun" },
  u:{ rayop:.10, glow:"16px", flashscale:3.2, banner:"Peu commun" },
  r:{ rayop:.20, glow:"30px", flashscale:4.2, banner:"Rareté" },
  l:{ rayop:.34, glow:"52px", flashscale:5.5, banner:"★ Légendaire ★" },
};

/* ============================================================
   2. TIRAGE DÉTERMINISTE (à porter tel quel dans la GitHub Action)
   ============================================================ */
function fnv1a(str){let h=0x811c9dc5;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,0x01000193);}return h>>>0;}
function drawFromSha(sha){
  const r = fnv1a(sha+":tier")/2**32;
  let acc=0, tier="l"; for(const[t,w] of WEIGHTS){acc+=w; if(r<acc){tier=t;break;}}
  const pool=POOL[tier];
  return { species: pool[fnv1a(sha+":pick")%pool.length], shiny: fnv1a(sha+":shiny")%SHINY_ODDS===0 };
}
const sprite = (id,shiny)=>`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${shiny?"shiny/":""}${id}.png`;

/* ============================================================
   3. DONNÉES DE DÉMO — remplace catches.json + state.json
   40 fausses PR dont 3 en attente d'ouverture.
   ============================================================ */
const FAKE_PRS = [
  ["fix: race condition à l'upload de fichiers","moi/atlas",142,"2026-02-03"],
  ["feat: pagination curseur sur /events","moi/atlas",145,"2026-02-11"],
  ["chore: bump vite 5 → 6","moi/atlas",147,"2026-02-14"],
  ["refactor: extraire le client HTTP","moi/atlas",151,"2026-02-20"],
  ["fix: fuseau horaire dans les exports CSV","moi/atlas",153,"2026-02-24"],

  ["test: couvrir le parser de dates","moi/atlas",158,"2026-03-05"],
  ["fix: memory leak sur le worker","moi/atlas",161,"2026-03-09"],
  ["docs: README de contribution","moi/pergola",14,"2026-03-12"],
  ["feat: recherche floue dans la sidebar","moi/pergola",17,"2026-03-18"],

  ["fix: crash au resize sur Safari","moi/pergola",21,"2026-03-27"],

  ["feat: undo/redo","moi/pergola",51,"2026-06-20"],
  ["chore: passer en pnpm","moi/atlas",208,"2026-06-24"],

  ["feat: notifications par e-mail","moi/atlas",212,"2026-07-02"],
  ["test: e2e du parcours d'inscription","moi/atlas",215,"2026-07-06"],
  ["fix: cache invalidé trop tôt","moi/pergola",58,"2026-07-09"],
  ["feat: thèmes personnalisés","moi/pergola",61,"2026-07-13"],
  ["fix: null check sur avatar_url","moi/atlas",219,"2026-07-15"],
  ["feat: recherche par tag","moi/atlas",221,"2026-07-16"],
  ["chore: mettre à jour les types","moi/pergola",63,"2026-07-17"],
];
const fakeSha = i => Array.from({length:40},(_,k)=>"0123456789abcdef"[fnv1a("seed"+i+"_"+k)%16]).join("");
function loadDemo(){
  const list = FAKE_PRS.map(([title,repo,pr,date],i)=>{
    const sha=fakeSha(i); const {species,shiny}=drawFromSha(sha);
    return { via:"pr", sha, pr, title, repo, date, species, shiny, claimed: i < FAKE_PRS.length-3 };
  });
  // garantir des exemples chromatiques dans la démo : un capturé (visible au tiroir/fiche)
  // et un en attente (visible au rituel).
  list[9].shiny = true;
  list[list.length-2].shiny = true;
  return list;
}

/* ============================================================
   4. APP
   ============================================================ */
createApp({
  setup(){
    // vue : 'connect' | 'dex' ; l'app démarre en démo (données en place)
    const view    = ref("dex");
    const connErr = ref(null);            // null | 'invalid' | 'revoked' | 'notfound'
    const repo    = ref("moi/pr-dex-data");
    const token   = ref("");

    const entries  = ref(loadDemo());
    const spent    = reactive({});
    const selected = ref(null);
    const ritual   = ref(null);           // { entry, opened }
    const evoAnim  = ref(null);           // { from, to, shiny }
    const settings = ref(false);

    const claimed = computed(()=>entries.value.filter(e=>e.claimed));
    const pending = computed(()=>entries.value.filter(e=>!e.claimed));
    const bySpecies = computed(()=>{ const m={}; claimed.value.forEach(e=>{(m[e.species]??=[]).push(e);}); return m; });
    const caughtCount = computed(()=>Object.keys(bySpecies.value).length);

    const candies = id => {
      const fam=familyOf(id);
      const earned = claimed.value.filter(e=>e.via==="pr" && familyOf(e.species)===fam).length*CANDY_PER_CATCH;
      return earned - (spent[fam]??0);
    };
    // doublons d'une espèce sans aucune évolution possible (question ouverte 1)
    const isDeadEnd = id => !hasEvoInFamily(id);

    function openRitual(){ if(!pending.value.length) return; ritual.value={ entry:pending.value[0], stage:"sealed", t:null }; }
    function tear(){
      const r=ritual.value; r.stage="silhouette"; r.entry.claimed=true;
      const reduce=window.matchMedia("(prefers-reduced-motion:reduce)").matches;
      const hold=reduce?150:(DEX[r.entry.species].tier==="l"?2800:2200);
      r.t=setTimeout(()=>{ if(ritual.value===r) r.stage="revealed"; }, hold);
    }
    function closeRitual(){ if(ritual.value&&ritual.value.t) clearTimeout(ritual.value.t); ritual.value=null; if(pending.value.length) openRitual(); }
    function skipAll(){ if(ritual.value&&ritual.value.t) clearTimeout(ritual.value.t); pending.value.slice().forEach(e=>e.claimed=true); ritual.value=null; }

    function evolve(fromId,toId){
      const s=DEX[fromId], fam=familyOf(fromId);
      if(candies(fromId)<s.cost) return;
      spent[fam]=(spent[fam]??0)+s.cost;
      const source=bySpecies.value[fromId][0];
      selected.value=null;
      evoAnim.value={ from:fromId, to:toId, shiny:source.shiny };
      setTimeout(()=>{
        entries.value.push({ via:"evo", species:toId, from:fromId, shiny:source.shiny, date:new Date().toISOString().slice(0,10), claimed:true });
      }, 1400);
    }
    function finishEvo(){ const to=evoAnim.value.to; evoAnim.value=null; selected.value=to; }

    // connexion (démo : simule les états, pas d'appel réseau réel)
    function connect(){
      if(!token.value.trim()){ connErr.value="invalid"; return; }
      connErr.value=null; view.value="dex";
    }
    function disconnect(){ token.value=""; connErr.value=null; settings.value=false; view.value="connect"; }
    function simulate(kind){ view.value="connect"; connErr.value=kind; }

    return {
      DEX,TIER_LABEL,TIER_VAR,CANDY_PER_CATCH,INTENSITY,sprite,familyOf,PARENT,isDeadEnd,
      view,connErr,repo,token,settings,
      entries,selected,ritual,evoAnim,
      claimed,pending,bySpecies,caughtCount,candies,
      openRitual,tear,closeRitual,skipAll,evolve,finishEvo,connect,disconnect,simulate,
      ids:Object.keys(DEX).map(Number),
      sparks:Array.from({length:16},(_,i)=>({left:(fnv1a("sx"+i)%100)+"%",top:(fnv1a("sy"+i)%100)+"%",animationDelay:((fnv1a("sd"+i)%160)/100)+"s"})),
    };
  },

  template:`
  <!-- ═══════ ÉCRAN : PAS ENCORE CONNECTÉ ═══════ -->
  <div v-if="view==='connect'" class="front">
    <div class="front-mark">PR<span>·</span>DEX</div>
    <p class="front-sub">Le dex vit dans un repo GitHub privé. Colle un jeton d'accès une fois : l'app lit tes captures et y écrit tes décisions. Rien n'est stocké ailleurs.</p>

    <div v-if="connErr" class="banner err">
      <span class="bico">✕</span>
      <div>
        <span class="bt" v-if="connErr==='invalid'">Jeton invalide.</span>
        <span class="bt" v-else-if="connErr==='revoked'">Jeton révoqué.</span>
        <span class="bt" v-else-if="connErr==='notfound'">Repo introuvable.</span>
        <template v-if="connErr==='invalid'"> Le jeton est vide ou mal copié. Recopie-le en entier depuis GitHub, sans espace au début ni à la fin.</template>
        <template v-else-if="connErr==='revoked'"> GitHub a refusé ce jeton — il a expiré ou a été supprimé. Fabriques-en un nouveau et colle-le ci-dessous.</template>
        <template v-else-if="connErr==='notfound'"> Le jeton est bon mais <b class="mono">{{ repo }}</b> n'existe pas ou n'est pas dans sa portée. Vérifie le nom du repo et que le jeton est bien scopé dessus.</template>
      </div>
    </div>

    <div class="sheet">
      <div class="sheet-h"><span class="eyebrow">Fabriquer le jeton</span><span class="mono" style="font-size:11px;color:var(--ink-3)">github.com › settings › tokens</span></div>
      <div class="sheet-b">
        <ol class="steps">
          <li>Sur GitHub, ouvre <code>Settings › Developer settings › Fine-grained tokens</code>.</li>
          <li>Portée : <b>ce repo uniquement</b> — <code>{{ repo }}</code>. Pas « all repositories ».</li>
          <li>Permission <code>Contents</code> en <b>Read and write</b>. Rien d'autre.</li>
          <li>Expiration : <b>No expiration</b> — c'est un outil perso qu'on ne veut pas ré-armer.</li>
        </ol>
        <div class="perm">
          <div class="perm-row"><span class="k">Portée</span> {{ repo }} — <b>ce repo seul</b></div>
          <div class="perm-row"><span class="k">Contents</span> <b>read / write</b></div>
          <div class="perm-row"><span class="k">Expiration</span> <b>aucune</b></div>
        </div>
        <div class="field">
          <label for="tok">Jeton d'accès</label>
          <input id="tok" v-model="token" type="password" placeholder="github_pat_..." @keyup.enter="connect">
        </div>
        <div class="field">
          <label for="rp">Repo de données</label>
          <input id="rp" v-model="repo" type="text" spellcheck="false">
        </div>
        <div class="front-actions">
          <button class="btn-solid" @click="connect">Se connecter</button>
          <span class="muted">Le jeton reste sur cette machine. Le site public ne contient aucune donnée.</span>
        </div>
      </div>
    </div>

    <div class="sim">
      <span class="eyebrow">Aperçu maquette — sauter dans l'app / voir les erreurs</span>
      <div class="sim-row">
        <button @click="view='dex'">→ Entrer (données de démo)</button>
        <button @click="connErr='invalid'">jeton invalide</button>
        <button @click="connErr='revoked'">jeton révoqué</button>
        <button @click="connErr='notfound'">repo introuvable</button>
      </div>
    </div>
  </div>

  <!-- ═══════ APP ═══════ -->
  <template v-else>
  <header class="rail">
    <div>
      <div class="wordmark">PR<span>·</span>DEX</div>
      <div class="eyebrow rail-sub">Une PR mergée, un Pokémon</div>
    </div>
    <div class="progress">
      <div class="progress-head">
        <span class="eyebrow">Collection</span>
        <span class="progress-count"><b>{{ String(caughtCount).padStart(3,'0') }}</b><i> / 151</i></span>
      </div>
      <div class="bar"><div class="bar-fill" :style="{width:(caughtCount/151*100)+'%'}"></div></div>
    </div>
    <div class="rail-tools">
      <button class="claim-btn" :class="{pulsing:pending.length}" :disabled="!pending.length" @click="openRitual">
        {{ pending.length ? 'Ouvrir' : 'Rien à ouvrir' }}
        <span v-if="pending.length" class="pip">{{ pending.length }}</span>
      </button>
      <button class="gear" title="Réglages" @click="settings=true">⚙</button>
    </div>
  </header>

  <!-- ── tiroir ── -->
  <div class="tray">
    <button v-for="id in ids" :key="id" class="cell"
      :class="{ has:bySpecies[id], ghost:!bySpecies[id], shiny:bySpecies[id]?.some(e=>e.shiny) }"
      :style="{ '--tier':TIER_VAR[DEX[id].tier] }"
      :disabled="!bySpecies[id]" @click="selected=id">
      <span class="cell-no mono">{{ String(id).padStart(3,'0') }}</span>
      <span v-if="bySpecies[id]" class="cell-sha mono">{{ bySpecies[id][0].via==='pr' ? bySpecies[id][0].sha.slice(0,7) : 'évolué' }}</span>
      <span v-if="bySpecies[id]?.length>1" class="cell-dupes mono">×{{ bySpecies[id].length }}</span>
      <img :src="sprite(id, bySpecies[id]?.some(e=>e.shiny))" :alt="DEX[id].name" loading="lazy">
      <span v-if="bySpecies[id]" class="tier"></span>
    </button>
  </div>

  <!-- ── fiche ── -->
  <transition name="fade">
  <div v-if="selected" class="scrim" @click.self="selected=null">
    <div class="panel" :style="{ '--tier':TIER_VAR[DEX[selected].tier] }">
      <div class="panel-top">
        <button class="x" @click="selected=null">✕</button>
        <div class="panel-art" :class="{ghost:!bySpecies[selected]}">
          <img :src="sprite(selected, bySpecies[selected]?.some(e=>e.shiny))" :alt="DEX[selected].name">
        </div>
        <div>
          <span class="panel-plate mono">PLANCHE Nº {{ String(selected).padStart(3,'0') }}</span>
          <h2 class="panel-name">{{ bySpecies[selected] ? DEX[selected].name : '—————' }}</h2>
          <span class="chip">{{ TIER_LABEL[DEX[selected].tier] }}</span>
          <span v-if="bySpecies[selected]?.some(e=>e.shiny)" class="chip shiny-chip" style="margin-left:6px">✦ Chromatique</span>
        </div>
      </div>

      <div v-if="!bySpecies[selected]" class="sect">
        <p class="muted">Pas encore à la planche. Sortira d'une PR<template v-if="PARENT[selected]">, ou d'une évolution de <b>{{ DEX[PARENT[selected]].name }}</b></template>.</p>
      </div>

      <!-- journal des captures = vision des doublons -->
      <div v-if="bySpecies[selected]" class="sect">
        <div class="eyebrow sect-h">
          <span>Journal des captures</span>
          <span class="mono" style="color:var(--ink-3)">{{ bySpecies[selected].length }} entrée{{ bySpecies[selected].length>1?'s':'' }}</span>
        </div>
        <div class="log">
          <component v-for="e in bySpecies[selected]" :key="e.sha || e.date"
            :is="e.via==='pr' ? 'a' : 'div'" class="log-row"
            :href="e.via==='pr' ? 'https://github.com/'+e.repo+'/pull/'+e.pr : null" target="_blank" rel="noopener">
            <span v-if="e.via==='pr'" class="log-sha">{{ e.sha.slice(0,7) }}</span>
            <span v-else class="log-evo">↑ évo</span>
            <span class="log-title">
              {{ e.via==='pr' ? e.title : 'Évolué depuis ' + DEX[e.from].name }}
              <span v-if="e.via==='pr'" class="log-repo"> · {{ e.repo }}#{{ e.pr }}</span>
            </span>
            <span class="log-date">{{ e.date }}</span>
          </component>
        </div>
      </div>

      <!-- bonbons + évolution -->
      <div v-if="bySpecies[selected] && DEX[selected].to" class="sect">
        <div class="eyebrow sect-h"><span>Bonbons {{ DEX[familyOf(selected)].name }}</span></div>
        <div class="candy">
          <div class="candy-meter">
            <div class="candy-nums"><b>{{ candies(selected) }}</b><i> / {{ DEX[selected].cost }}</i></div>
            <div class="cbar"><div class="cbar-fill" :style="{width:Math.min(100,candies(selected)/DEX[selected].cost*100)+'%'}"></div></div>
          </div>
          <button v-if="!Array.isArray(DEX[selected].to)" class="evo-btn" :disabled="candies(selected)<DEX[selected].cost" @click="evolve(selected,DEX[selected].to)">
            Faire évoluer en {{ DEX[DEX[selected].to].name }}
          </button>
        </div>
        <div v-if="Array.isArray(DEX[selected].to)" class="evo-choices">
          <button v-for="t in DEX[selected].to" :key="t" class="evo-choice" :disabled="candies(selected)<DEX[selected].cost" @click="evolve(selected,t)">
            <img :src="sprite(t)" :alt="DEX[t].name">{{ DEX[t].name }}
          </button>
        </div>
        <p class="muted" style="margin-top:12px">{{ CANDY_PER_CATCH }} bonbons par capture dans la famille. Les doublons servent à ça.</p>
      </div>

      <!-- réserve : doublons d'une espèce sans évolution (question ouverte 1) -->
      <div v-else-if="bySpecies[selected] && bySpecies[selected].length>1 && isDeadEnd(selected)" class="sect">
        <div class="eyebrow sect-h"><span>La réserve</span></div>
        <div class="reserve">
          <div class="reserve-count mono">{{ bySpecies[selected].length }}</div>
          <div class="reserve-txt">
            <p class="muted"><b>{{ DEX[selected].name }}</b> n'évolue pas — ses doublons ne se convertissent pas, et c'est assumé. Ils s'empilent comme une petite collection dans la réserve : « encore un », mais dans un tiroir qui se remplit.</p>
            <div class="press"><span v-for="n in Math.min(bySpecies[selected].length,12)" :key="n">{{ String(selected).padStart(3,'0') }}</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  </transition>

  <!-- ── rituel ── -->
  <transition name="fade">
  <div v-if="ritual" class="ritual" :class="{ opened:ritual.stage!=='sealed', leg:ritual.stage!=='sealed' && DEX[ritual.entry.species].tier==='l' }"
       :style="{ '--tier':TIER_VAR[DEX[ritual.entry.species].tier], ...(ritual.stage!=='sealed'?{'--rayop':INTENSITY[DEX[ritual.entry.species].tier].rayop,'--glow':INTENSITY[DEX[ritual.entry.species].tier].glow,'--flashscale':INTENSITY[DEX[ritual.entry.species].tier].flashscale}:{}) }">

    <template v-if="ritual.stage==='sealed'">
      <div class="stack">
        <div v-if="pending.length>2" class="ghost-pkt g1"></div>
        <div v-if="pending.length>1" class="ghost-pkt g2"></div>
        <button class="packet" @click="tear">
          <div class="pkt-head"><span class="pkt-kicker">Pli scellé · {{ ritual.entry.date }}</span></div>
          <div class="pkt-body">
            <div class="pkt-seal">✳</div>
            <div class="pkt-title">{{ ritual.entry.title }}</div>
            <div class="pkt-pr mono">{{ ritual.entry.repo }}#{{ ritual.entry.pr }}<br>{{ ritual.entry.sha.slice(0,7) }}</div>
          </div>
          <div class="pkt-foot">Briser le sceau</div>
        </button>
      </div>
      <div class="queue-note">{{ pending.length>1 ? pending.length+' plis en attente' : 'dernier pli' }}</div>
    </template>

    <template v-else>
      <div class="reveal" :class="ritual.stage">
        <div v-if="DEX[ritual.entry.species].tier!=='c'" class="rays"></div>
        <div v-if="ritual.stage==='silhouette'" class="dev-ring"></div>
        <div v-if="ritual.stage==='revealed'" class="flash"></div>
        <img :class="{silh:ritual.stage==='silhouette'}" :src="sprite(ritual.entry.species, ritual.entry.shiny)" :alt="DEX[ritual.entry.species].name">
        <div v-if="ritual.entry.shiny && ritual.stage==='revealed'" class="shiny-burst">
          <span v-for="(s,i) in sparks" :key="i" class="spark" :style="s"></span>
        </div>
      </div>
      <div v-if="ritual.stage==='silhouette'" class="dev-note mono">
        {{ ritual.entry.shiny ? 'quelque chose scintille…' : 'révélation en cours…' }}
      </div>
      <template v-if="ritual.stage==='revealed'">
        <div class="reveal-meta">
          <div v-if="ritual.entry.shiny" class="reveal-banner">✦ Chromatique ✦</div>
          <div v-else-if="DEX[ritual.entry.species].tier==='l'" class="reveal-banner">★ Légendaire ★</div>
          <div class="reveal-name">{{ DEX[ritual.entry.species].name }}</div>
          <div class="reveal-tags">
            <span class="chip">{{ TIER_LABEL[DEX[ritual.entry.species].tier] }}</span>
            <span v-if="ritual.entry.shiny" class="chip shiny-chip">✦ Chromatique</span>
          </div>
          <div class="reveal-note mono">+{{ CANDY_PER_CATCH }} bonbons <b>{{ DEX[familyOf(ritual.entry.species)].name }}</b></div>
        </div>
        <button class="next-btn" @click="closeRitual">{{ pending.length ? 'Suivant · '+pending.length+' restant'+(pending.length>1?'s':'') : 'Retour à la planche' }}</button>
        <button v-if="pending.length>1" class="queue-note" style="background:none;border:0;cursor:pointer;text-decoration:underline;text-underline-offset:3px" @click="skipAll">tout ouvrir sans cérémonie</button>
      </template>
    </template>
  </div>
  </transition>

  <!-- ── évolution ── -->
  <transition name="fade">
  <div v-if="evoAnim" class="evostage" :style="{ '--tier':TIER_VAR[DEX[evoAnim.to].tier] }">
    <div class="evo-frame">
      <div class="evo-glow"></div>
      <img class="evo-from" :src="sprite(evoAnim.from, evoAnim.shiny)" :alt="DEX[evoAnim.from].name">
      <img class="evo-to" :src="sprite(evoAnim.to, evoAnim.shiny)" :alt="DEX[evoAnim.to].name">
    </div>
    <div class="evo-cap">
      <div class="reveal-banner" style="color:var(--ochre)">Évolution</div>
      <div class="reveal-name">{{ DEX[evoAnim.from].name }} → {{ DEX[evoAnim.to].name }}</div>
      <button class="next-btn" style="margin-top:20px" @click="finishEvo">Voir la planche</button>
    </div>
  </div>
  </transition>

  <!-- ── réglages ── -->
  <transition name="fade">
  <div v-if="settings" class="scrim" @click.self="settings=false">
    <div class="panel" style="width:min(480px,100%)">
      <div class="panel-top" style="align-items:flex-start;padding-bottom:20px">
        <button class="x" @click="settings=false">✕</button>
        <div>
          <span class="panel-plate mono">RÉGLAGES</span>
          <h2 class="panel-name" style="font-size:23px;margin-bottom:0">Source de données</h2>
        </div>
      </div>
      <div class="sect">
        <div class="eyebrow sect-h"><span>Repo pointé</span></div>
        <div class="repo-ptr"><span class="dot"></span>{{ repo }} · connecté</div>
      </div>
      <div class="sect">
        <div class="eyebrow sect-h"><span>Jeton d'accès</span></div>
        <div class="field"><input type="password" value="github_pat_••••••••••••••••" readonly style="opacity:.7"></div>
        <div class="front-actions" style="margin-top:12px">
          <button class="btn-ghost" @click="disconnect">Remplacer le jeton</button>
        </div>
      </div>
      <div class="sect">
        <p class="muted">Le jeton est stocké sur cette machine uniquement. Les captures viennent de <b class="mono">catches.json</b> (écrit par l'Action) ; tes décisions vont dans <b class="mono">state.json</b> (écrit ici).</p>
      </div>
    </div>
  </div>
  </transition>
  </template>
  `
}).mount("#app");
</script>
</body>
</html>
