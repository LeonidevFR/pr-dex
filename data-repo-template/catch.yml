name: catch

on:
  schedule:
    # Toutes les heures, 8h-19h heure de Paris (6h-17h UTC, calé sur l'été CEST — glisse
    # d'1h en hiver CET faute de fuseau horaire dans la syntaxe cron de GitHub Actions).
    #
    # Ce workflow n'écrit plus dans ce repo (les captures vont dans Supabase) : il ne
    # s'auto-entretient donc plus comme au temps du stockage git. GitHub désactive un
    # planning après 60 jours d'inactivité du REPO (pas du workflow) — sans autre commit
    # ici entre-temps, il faudra le relancer manuellement (workflow_dispatch) pour le
    # réveiller. Accepté : ce dépôt n'a de toute façon plus d'autre activité.
    - cron: '0 6-17 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: catch
  cancel-in-progress: false

jobs:
  catch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Chercher les PR mergées de chaque profil et les insérer dans Supabase
        env:
          # PAT fine-grained : lecture seule sur les repos surveillés. Commun à tous les
          # profils — chacun n'est filtré que par son propre github_login en base.
          CATCH_TOKEN: ${{ secrets.CATCH_TOKEN }}
          # service_role : contourne RLS, seul moyen d'écrire dans `catches` pour tous les
          # user_id. Ne vit que dans ce secret, jamais côté front ni dans le repo public.
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          BOOTSTRAP_SINCE: ${{ vars.BOOTSTRAP_SINCE }}
        run: node scripts/catch.mjs
