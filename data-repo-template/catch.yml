name: catch

on:
  schedule:
    # Toutes les heures, 8h-19h heure de Paris (6h-17h UTC, calé sur l'été CEST — glisse
    # d'1h en hiver CET faute de fuseau horaire dans la syntaxe cron de GitHub Actions).
    # GitHub endort les workflows planifiés après 60 jours d'inactivité du repo — celui-ci
    # commite dans son propre repo dès qu'il capture, il s'auto-entretient tant qu'il y a
    # des PR à trouver.
    - cron: '0 6-17 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: catch
  cancel-in-progress: false

jobs:
  catch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Chercher les PR mergées
        env:
          # PAT fine-grained : lecture sur les repos surveillés, écriture sur ce repo.
          # GITHUB_TOKEN ne suffit pas — il n'a accès qu'à ce repo.
          CATCH_TOKEN: ${{ secrets.CATCH_TOKEN }}
          WATCH_USER: ${{ vars.WATCH_USER }}
          WATCH_REPOS: ${{ vars.WATCH_REPOS }}
          BOOTSTRAP_SINCE: ${{ vars.BOOTSTRAP_SINCE }}
        run: node scripts/catch.mjs

      - name: Commiter les nouvelles captures
        run: |
          git add data/catches.json
          # `git diff` seul ignore un fichier non suivi : au tout premier run, `data/catches.json`
          # vient d'être créé et ne serait pas vu comme une modification. On indexe d'abord, puis
          # on compare l'index à HEAD.
          if git diff --staged --quiet -- data/catches.json; then
            echo "Rien de nouveau, pas de commit."
            exit 0
          fi
          git config user.name  "pr-dex[bot]"
          git config user.email "pr-dex@users.noreply.github.com"
          git commit -m "chore: nouvelles captures"
          git push
